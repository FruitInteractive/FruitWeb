<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <style>
    body {
      margin: 0;
      background-color: #0d0d0d;
      font-family: sans-serif;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #111111;
    }
    .logo img {
      height: 40px;
    }
    .login-btn {
      background-color: #5865F2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .login-btn:hover {
      background-color: #4752c4;
    }
    .login-btn img {
      height: 20px;
      width: 20px;
      margin-right: 10px;
    }
    .divider {
      height: 2px;
      background-color: #222222;
      margin: 0;
    }
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .login-btn {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="assets/images/Lemon.png" alt="Logo">
    </div>
    <a href="/auth/discord" class="login-btn">
      <img src="assets/images/discord-icon.png" alt="Discord"> Login with Discord
    </a>
  </header>
  <hr class="divider">
</body>
</html>
