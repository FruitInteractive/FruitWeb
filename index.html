<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Interactive</title>
<style>
body {margin:0;background-color:#0d0d0d;font-family:sans-serif;}
header {display:flex;justify-content:space-between;align-items:center;padding:8px 20px;background-color:#111111;min-height:50px;}
.logo img {height:60px;width:auto;display:block;}
.login-btn {background-color:transparent;color:#ffffff;border:1px solid #ffffff;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:bold;display:flex;align-items:center;text-decoration:none;transition:0.2s;}
.login-btn:hover {background-color:#1a1a1a;}
.login-btn img {height:20px;width:20px;margin-right:8px;}
.divider {height:1px;background-color:#222222;margin:0;}
@media(max-width:600px){header{flex-direction:column;align-items:flex-start}.login-btn{margin-top:6px}}
</style>
</head>
<body>
<header>
<div class="logo">
<img src="assets/images/Lemon.png" alt="Logo">
</div>
<a href="/auth/discord" class="login-btn">
<img src="assets/images/discord-icon.png" alt="Discord"> Login with Discord
</a>
</header>
<hr class="divider">
</body>
</html>
